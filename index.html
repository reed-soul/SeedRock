<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeedRock — procedural rock generator</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0e0f12; }
    #app { position: fixed; inset: 0; }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #a8b4c4; background: rgba(14, 15, 18, 0.72);
      padding: 8px 10px; border: 1px solid #2a313c; border-radius: 6px;
      pointer-events: none; white-space: pre;
    }
    #err {
      position: fixed; inset: 0; display: none; place-items: center;
      color: #ff9c9c; font: 14px/1.5 ui-monospace, monospace; padding: 24px;
      text-align: center; background: #0e0f12;
    }
    #loading {
      position: fixed; inset: 0; z-index: 20; display: flex;
      align-items: center; justify-content: center;
      background: radial-gradient(120% 120% at 50% 40%, rgba(18, 20, 24, 0.88), rgba(8, 9, 11, 0.96));
      backdrop-filter: blur(3px);
      color: #e8eaee; font: 13px/1.5 'Segoe UI', system-ui, sans-serif;
      text-align: center; letter-spacing: 0.02em;
      opacity: 1; transition: opacity 0.4s ease;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    #loading .card {
      display: flex; flex-direction: column; align-items: center; gap: 18px;
      padding: 32px 44px 26px; border-radius: 16px;
      background: #16181d; box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(140, 150, 165, 0.22);
    }
    #loading .brand {
      font-size: 22px; font-weight: 600; letter-spacing: 0.08em;
      color: #d4dae3;
    }
    #loading .bar {
      width: 300px; max-width: 60vw; height: 6px; border-radius: 4px;
      background: rgba(0, 0, 0, 0.38); border: 1px solid rgba(120, 130, 145, 0.28); overflow: hidden;
    }
    #loading .bar-fill {
      height: 100%; width: 0%; border-radius: 4px;
      background: linear-gradient(90deg, #6b7280, #9ca3af 55%, #d1d5db);
      box-shadow: 0 0 10px rgba(180, 190, 200, 0.35); transition: width 0.25s ease;
    }
    #loading .msg { min-height: 1.4em; color: #9aa3b2; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">SeedRock</div>
  <div id="err"></div>
  <div id="loading">
    <div class="card">
      <div class="brand">SEEDROCK</div>
      <div class="bar"><div class="bar-fill"></div></div>
      <div class="msg">Initializing WebGPU…</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
