<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeedRock — procedural rock generator</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0e0f12; }
    #app { position: fixed; inset: 0; }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      font: 11px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #8a96a8; background: rgba(10, 12, 16, 0.55);
      padding: 7px 9px; border: 1px solid rgba(80, 90, 108, 0.35); border-radius: 6px;
      pointer-events: none; white-space: pre; backdrop-filter: blur(4px);
    }
    #err {
      position: fixed; inset: 0; display: none; place-items: center;
      color: #ff9c9c; font: 14px/1.5 ui-monospace, monospace; padding: 24px;
      text-align: center; background: #0e0f12;
    }
    /* Loading overlay — the full visual treatment lives in theme.css
       (imported via controls.js). This inline rule only guarantees the
       overlay is visible on first paint, before the module bundle loads,
       so there's never a flash of unstyled content. */
    #loading {
      position: fixed; inset: 0; z-index: 20; display: flex;
      align-items: center; justify-content: center;
      background: radial-gradient(120% 120% at 50% 40%, rgba(18, 20, 24, 0.88), rgba(8, 9, 11, 0.96));
      backdrop-filter: blur(3px);
    }
    #examples-link {
      position: fixed; top: 12px; right: 12px; z-index: 10;
      font: 13px/1 'Segoe UI', system-ui, sans-serif;
      color: #c4cab4; padding: 8px 12px; border-radius: 8px;
      border: 1px solid #2a313c; background: rgba(14, 15, 18, 0.78);
      text-decoration: none;
    }
    #examples-link:hover { border-color: var(--sr-ochre, #c87f3f); color: #e8eaee; }
  </style>
</head>
<body>
  <div id="app"></div>
  <a id="examples-link" href="./examples.html">Examples</a>
  <div id="hud">SeedRock</div>
  <div id="err"></div>
  <div id="loading" class="on">
    <div class="card sr-breath-border">
      <div class="sr-brand"><span class="sr-brand-dot"></span>SEEDROCK</div>
      <div class="bar"><div class="bar-fill"></div></div>
      <div class="msg">Initializing WebGPU…</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
