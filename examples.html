<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeedRock — Examples</title>
  <meta name="description" content="Curated procedural rock demos — open any preset in the interactive viewer." />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0e0f12;
      --surface: #16181d;
      --border: rgba(140, 150, 165, 0.22);
      --text: #e8eaee;
      --muted: #9aa3b2;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; min-height: 100%;
      font: 15px/1.55 'Segoe UI', system-ui, sans-serif;
      color: var(--text); background: var(--bg);
      background-image: radial-gradient(120% 80% at 50% -20%, rgba(60, 70, 90, 0.25), transparent);
    }
    a { color: inherit; text-decoration: none; }
    .wrap { width: min(1120px, 92vw); margin: 0 auto; padding: 28px 0 64px; }
    header {
      display: flex; flex-wrap: wrap; align-items: center;
      justify-content: space-between; gap: 16px; margin-bottom: 32px;
    }
    .brand { font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
    h1 { margin: 6px 0 0; font-size: clamp(1.6rem, 4vw, 2.1rem); font-weight: 600; }
    .lead { margin: 10px 0 0; max-width: 52ch; color: var(--muted); }
    .nav-link {
      padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(22, 24, 29, 0.8); font-size: 14px; transition: border-color 0.15s;
    }
    .nav-link:hover { border-color: rgba(180, 190, 205, 0.45); }
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }
    .card {
      display: flex; flex-direction: column; min-height: 220px;
      border-radius: 14px; border: 1px solid var(--border);
      background: var(--surface); overflow: hidden;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      content-visibility: auto; contain-intrinsic-size: 220px;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: color-mix(in srgb, var(--accent) 55%, var(--border));
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
    }
    .swatch {
      height: 6px;
      background: linear-gradient(90deg, var(--accent), color-mix(in srgb, var(--accent) 40%, #fff));
    }
    .body { flex: 1; padding: 18px 18px 10px; }
    .body h2 { margin: 0 0 6px; font-size: 1.1rem; font-weight: 600; }
    .meta { margin: 0 0 8px; font: 12px/1.4 ui-monospace, monospace; color: var(--muted); }
    .desc { margin: 0; font-size: 14px; color: #c4cad4; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .tag {
      font-size: 11px; padding: 3px 8px; border-radius: 999px;
      background: rgba(255, 255, 255, 0.06); color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .cta {
      padding: 12px 18px; font-size: 13px; color: var(--accent);
      border-top: 1px solid var(--border);
    }
    footer {
      margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border);
      font-size: 13px; color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="brand">SeedRock</div>
        <h1>Example Gallery</h1>
        <p class="lead">Curated rock presets — click any card to open the interactive WebGPU viewer with that configuration.</p>
      </div>
      <a class="nav-link" href="./index.html">← Open viewer</a>
    </header>
    <main id="gallery" aria-label="Rock examples"></main>
    <footer>
      Add your own species — see
      <a href="https://github.com/reed-soul/SeedRock/blob/master/docs/COMMUNITY_SPECIES.md">Community Species Guide</a>.
    </footer>
  </div>
  <script type="module" src="/src/examples/page.js"></script>
</body>
</html>
